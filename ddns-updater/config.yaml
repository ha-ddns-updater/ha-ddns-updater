name: DDNS Updater
version: "2.10.0-ha1.8.0"
slug: ddns_updater
description: Universal DNS updater with support for multiple DNS providers
  utilizing ddns-updater.
arch:
  - aarch64
  - amd64
url: "https://github.com/ha-ddns-updater/ha-ddns-updater"
ingress: true
ingress_port: 8000
panel_icon: mdi:dns
host_network: true
map:
  - type: addon_config
    read_only: false
options:
  environments:
    PERIOD: "5m"
    SERVER_ENABLED: "yes"
    LOG_LEVEL: "info"
  settings:
    - domain: "example.duckdns.org"
      provider: "duckdns"
      token: "00000000-0000-0000-0000-000000000000"
    - domain: "example.com"
      provider: "cloudflare"
      owner: "subdomain"
      email: "user@example.com"
      key: "your-api-key"
schema:
  environments:
    PERIOD: str?
    UPDATE_COOLDOWN_PERIOD: str?
    HTTP_TIMEOUT: str?
    SERVER_ENABLED: list(yes|no)?
    LISTENING_ADDRESS: str?
    LOG_LEVEL: list(debug|info|warn|error)?
    LOG_CALLER: list(hidden|short)?
    UMASK: match(^[0-7]{3,4}$)?
    TZ: match(^$|^([A-Za-z_]+(?:/[A-Za-z0-9_+\-]+)+|UTC)$)?
    PUBLICIP_FETCHERS: match(^\s*(all|http|dns)\s*(,\s*(all|http|dns)\s*)*$)?
    PUBLICIP_HTTP_PROVIDERS: match(^\s*(all|ipify|ifconfig|ipinfo|spdyn|ipleak|icanhazip|ident|nnev|wtfismyip|seeip|changeip|url:https://[^,\s]+)\s*(,\s*(all|ipify|ifconfig|ipinfo|spdyn|ipleak|icanhazip|ident|nnev|wtfismyip|seeip|changeip|url:https://[^,\s]+)\s*)*$)?
    PUBLICIPV4_HTTP_PROVIDERS: match(^\s*(all|ipleak|ipify|icanhazip|ident|nnev|wtfismyip|seeip|url:https://[^,\s]+)\s*(,\s*(all|ipleak|ipify|icanhazip|ident|nnev|wtfismyip|seeip|url:https://[^,\s]+)\s*)*$)?
    PUBLICIPV6_HTTP_PROVIDERS: match(^\s*(all|ipleak|ipify|icanhazip|ident|nnev|wtfismyip|seeip|url:https://[^,\s]+)\s*(,\s*(all|ipleak|ipify|icanhazip|ident|nnev|wtfismyip|seeip|url:https://[^,\s]+)\s*)*$)?
    PUBLICIP_DNS_PROVIDERS: match(^\s*(all|cloudflare|opendns)\s*(,\s*(all|cloudflare|opendns)\s*)*$)?
    PUBLICIP_DNS_TIMEOUT: str?
    RESOLVER_ADDRESS: match(^$|^[^:\s]+:\d{1,5}$|^\[[0-9A-Fa-f:]+\]:\d{1,5}$)?
    RESOLVER_TIMEOUT: str?
    HEALTH_HEALTHCHECKSIO_BASE_URL: str?
    HEALTH_HEALTHCHECKSIO_UUID: str?
    BACKUP_PERIOD: str?
    SHOUTRRR_ADDRESSES: str?
    SHOUTRRR_DEFAULT_TITLE: str?
    CONFIG: str?
  settings:
    - domain: str
      provider: list(aliyun|allinkl|changeip|cloudflare|custom|dd24|ddnss|desec|digitalocean|dnsomatic|dnspod|domeneshop|dondominio|dreamhost|duckdns|dyn|dynu|dynv6|easydns|freedns|gandi|gcp|godaddy|goip|he|hetzner|hetznercloud|infomaniak|inwx|ionos|ipv64|linode|loopia|luadns|myaddr|namecheap|namecom|namesilo|netcup|njalla|noip|nowdns|opendns|ovh|porkbun|route53|scaleway|selfhostde|servercow|spaceship|spdyn|strato|variomedia|vercel|vultr|zoneedit)
      owner: str?
      ip_version: list(ipv4|ipv6|ipv4or6)?
      ipv6_suffix: match(^[0-9A-Fa-f:]+/(?:[0-9]|[1-9][0-9]|1[01][0-9]|12[0-8])$)?
      password: str?
      username: str?
      token: str?
      key: str?
      api_key: str?
      secret: str?
      email: str?
      secret_key: str?
      access_key_id: str?
      access_secret: str?
      region: str?
      ipv4key: str?
      ipv6key: str?
      success_regex: str?
      url: match(^https://.+$)?
      client_key: str?
      personal_access_token: str?
      credentials: str?
      project: str?
      zone: str?
      customer_number: str?
      api_endpoint: str?
      app_key: str?
      app_secret: str?
      consumer_key: str?
      mode: match(^(api|dyndns)$)?
      secret_api_key: str?
      access_key: str?
      zone_id: str?
      api_secret: str?
      apikey: str?
      ttl: int(1,4294967295)?
      zone_identifier: str?
      proxied: bool?
      user_service_key: match(^v1\.0.+$)?
      dual_stack: bool?
      group: str?
      user: str?
      team_id: str?
image: "docker.io/haddnsupdater/ha-ddns-updater"
init: false
