name: DDNS Updater
version: "2.9.0-ha1.2.7"
slug: ddns_updater
description: Universal DNS updater with support for multiple DNS providers utilizing ddns-updater.
arch:
  - aarch64
  - amd64
url: "https://github.com/ha-ddns-updater/ha-ddns-updater"
# startup: application
webui: "http://[HOST]:[PORT:8000]/"
# boot: auto
ports:
  "8000/tcp": 8000
ports_description:
  "8000/tcp": "Web UI for monitoring and management"
host_network: true
map:
  - type: data
    path: "/updater/data"
environment:
  HA_OPTIONS_FILEPATH: "/updater/data/options.json"
legacy: true # TODO: necessary? false needs some image labels
options:
  environments:
    PERIOD: "5m"
    SERVER_ENABLED: "yes"
    LOG_LEVEL: "info"
  settings:
    # Common fields for all providers:
    #   provider: (required) provider name — see list below
    #   domain: (required) domain or subdomain (e.g. sub.example.com, or example.com,sub.example.com for multiple)
    #   owner: (optional, retro-compat) subdomain / host owner — prefer encoding in domain field
    #   ip_version: ipv4 | ipv6 | ipv4or6 (default: ipv4or6)
    #   ipv6_suffix: IPv6 suffix prefix (e.g. ::/64)
    #
    # Provider-specific fields:
    #
    # aliyun:        access_key_id, access_secret, region
    # allinkl:       username, password
    # changeip:      username, password
    # cloudflare:    token OR (key + email) OR user_service_key; zone_identifier (optional), proxied (bool), ttl (uint)
    # custom:        url, ipv4key, ipv6key, success_regex
    # dd24:          password
    # ddnss.de:      username, password, dual_stack (bool)
    # desec:         token
    # digitalocean:  token
    # dnsomatic:     username, password
    # dnspod:        token
    # domeneshop:    token, secret
    # dondominio:    username, key
    # dreamhost:     key
    # duckdns:       token
    # dyn:           username, client_key
    # dynu:          username, password, group (optional)
    # dynv6:         token
    # easydns:       username, token
    # freedns:       token
    # gandi:         personal_access_token OR key; ttl (optional)
    # gcp:           project, zone, credentials (JSON object)
    # godaddy:       key, secret
    # goip:          username, password
    # he.net:        password
    # hetzner:       token; zone_identifier (optional), ttl (optional)
    # infomaniak:    username, password
    # inwx:          username, password
    # ionos:         api_key
    # linode:        token
    # loopia:        username, password
    # luadns:        email, token
    # myaddr:        key
    # namecheap:     password
    # name.com:      username, token; ttl (optional)
    # namesilo:      key; ttl (optional)
    # netcup:        customer_number, api_key, password
    # njalla:        key
    # noip:          username, password
    # nowdns:        username, password
    # opendns:       username, password
    # ovh:           mode (api|dyndns); api mode: app_key, app_secret, consumer_key, api_endpoint; dyndns mode: username, password
    # porkbun:       secret_api_key, api_key; ttl (optional)
    # route53:       access_key, secret_key, zone_id; ttl (optional)
    # selfhost.de:   username, password
    # servercow:     username, password; ttl (optional)
    # spdyn:         user + password OR token
    # strato:        password
    # variomedia:    email, password
    # vultr:         apikey; ttl (optional)
    # zoneedit:      username, token

    - provider: "duckdns"
      domain: "example.duckdns.org"
      token: "00000000-0000-0000-0000-000000000000"
    - provider: "cloudflare"
      domain: "example.com"
      owner: "subdomain"
      email: "user@example.com"
      key: "your-api-key"
schema:
  environments:
    PERIOD: str?
    UPDATE_COOLDOWN_PERIOD: str?
    HTTP_TIMEOUT: str?
    SERVER_ENABLED: list(yes|no)?
    LISTENING_ADDRESS: str?
    ROOT_URL: str?
    LOG_LEVEL: list(debug|info|warn|error)?
    LOG_CALLER: list(hidden|short)?
    DATADIR: str?
    CONFIG_FILEPATH: str?
    UMASK: str?
    PUBLICIP_FETCHERS: str?
    PUBLICIP_HTTP_PROVIDERS: str?
    PUBLICIPV4_HTTP_PROVIDERS: str?
    PUBLICIPV6_HTTP_PROVIDERS: str?
    PUBLICIP_DNS_PROVIDERS: str?
    PUBLICIP_DNS_TIMEOUT: str?
    RESOLVER_ADDRESS: str?
    RESOLVER_TIMEOUT: str?
    HEALTH_SERVER_ADDRESS: str?
    HEALTH_HEALTHCHECKSIO_BASE_URL: str?
    HEALTH_HEALTHCHECKSIO_UUID: str?
    BACKUP_PERIOD: str?
    BACKUP_DIRECTORY: str?
    SHOUTRRR_ADDRESSES: str?
    SHOUTRRR_DEFAULT_TITLE: str?
    CONFIG: str?
  settings:
    - provider: list(aliyun|allinkl|changeip|cloudflare|custom|dd24|ddnss|desec|digitalocean|dnsomatic|dnspod|domeneshop|dondominio|dreamhost|duckdns|dyn|dynu|dynv6|easydns|freedns|gandi|gcp|godaddy|goip|he|hetzner|infomaniak|inwx|ionos|linode|loopia|luadns|myaddr|namecheap|namecom|namesilo|netcup|njalla|noip|nowdns|opendns|ovh|porkbun|route53|selfhostde|servercow|spdyn|strato|variomedia|vultr|zoneedit)
      domain: str
      owner: str?
      ip_version: list(ipv4|ipv6|ipv4or6)?
      ipv6_suffix: str?
      # Provider-specific (all optional, provider-dependent)
      token: str?
      key: str?
      secret: str?
      password: str?
      username: str?
      email: str?
      access_key_id: str?
      access_secret: str?
      region: str?
      user_service_key: str?
      zone_identifier: str?
      proxied: bool?
      ttl: int?
      url: str?
      ipv4key: str?
      ipv6key: str?
      success_regex: str?
      dual_stack: bool?
      group: str?
      client_key: str?
      personal_access_token: str?
      project: str?
      zone: str?
      credentials: str?
      api_key: str?
      secret_api_key: str?
      access_key: str?
      secret_key: str?
      zone_id: str?
      customer_number: str?
      consumer_key: str?
      app_key: str?
      app_secret: str?
      api_endpoint: str?
      mode: str?
      user: str?
      apikey: str?

image: "docker.io/haddnsupdater/ha-ddns-updater"
init: false
