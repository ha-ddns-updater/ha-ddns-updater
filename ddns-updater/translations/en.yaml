configuration:
  environments:
    name: "Environment variables"
    description: "Environment variables passed directly to ddns-updater."
    fields:
      PERIOD:
        name: PERIOD
        description: "Default period of IP address check, following [this
          format](https://golang.org/pkg/time/#ParseDuration). Default: 5m."
      UPDATE_COOLDOWN_PERIOD:
        name: UPDATE_COOLDOWN_PERIOD
        description: "Duration to cooldown between updates for each record. This is
          useful to avoid being rate limited or banned. Default: 5m."
      HTTP_TIMEOUT:
        name: HTTP_TIMEOUT
        description: "Timeout for all HTTP requests. Default: 10s."
      SERVER_ENABLED:
        name: SERVER_ENABLED
        description: "Enable the web server and web UI. Default: yes."
      LISTENING_ADDRESS:
        name: LISTENING_ADDRESS
        description: "Internal TCP listening port for the web UI. Default: :8000."
      LOG_LEVEL:
        name: LOG_LEVEL
        description: "Level of logging, `debug`, `info`, `warning` or `error`. Default:
          info."
      LOG_CALLER:
        name: LOG_CALLER
        description: "Show caller per log line, `hidden` or `short`. Default: hidden."
      UMASK:
        name: UMASK
        description: "Umask to set for the program in octal, i.e. `0022`. Default:
          System current umask."
      TZ:
        name: TZ
        description: Timezone to have accurate times, i.e. `America/Montreal`.
      PUBLICIP_FETCHERS:
        name: PUBLICIP_FETCHERS
        description: "Comma separated fetcher types to obtain the public IP address from
          `http` and `dns`. Default: all."
      PUBLICIP_HTTP_PROVIDERS:
        name: PUBLICIP_HTTP_PROVIDERS
        description: "Comma separated providers to obtain the public IP address (ipv4 or
          ipv6). See the [Public IP section](#public-ip). Default: all."
      PUBLICIPV4_HTTP_PROVIDERS:
        name: PUBLICIPV4_HTTP_PROVIDERS
        description: "Comma separated providers to obtain the public IPv4 address only.
          See the [Public IP section](#public-ip). Default: all."
      PUBLICIPV6_HTTP_PROVIDERS:
        name: PUBLICIPV6_HTTP_PROVIDERS
        description: "Comma separated providers to obtain the public IPv6 address only.
          See the [Public IP section](#public-ip). Default: all."
      PUBLICIP_DNS_PROVIDERS:
        name: PUBLICIP_DNS_PROVIDERS
        description: "Comma separated providers to obtain the public IP address (IPv4
          and/or IPv6). See the [Public IP section](#public-ip). Default: all."
      PUBLICIP_DNS_TIMEOUT:
        name: PUBLICIP_DNS_TIMEOUT
        description: "Public IP DNS query timeout. Default: 3s."
      RESOLVER_ADDRESS:
        name: RESOLVER_ADDRESS
        description: "A plaintext DNS address to use to resolve your domain names
          defined in your settings only. For example it can be `1.1.1.1:53`.
          This is useful for split dns, see
          [#389](https://github.com/qdm12/ddns-updater/issues/389). Default:
          Your network DNS."
      RESOLVER_TIMEOUT:
        name: RESOLVER_TIMEOUT
        description: RESOLVER_TIMEOUT environment variable.
      HEALTH_HEALTHCHECKSIO_BASE_URL:
        name: HEALTH_HEALTHCHECKSIO_BASE_URL
        description: "Base URL for the [healthchecks.io](https://healthchecks.io)
          server. Default: https://hc-ping.com."
      HEALTH_HEALTHCHECKSIO_UUID:
        name: HEALTH_HEALTHCHECKSIO_UUID
        description: UUID to idenfity with the
          [healthchecks.io](https://healthchecks.io) server.
      BACKUP_PERIOD:
        name: BACKUP_PERIOD
        description: "Set to a period (i.e. `72h15m`) to enable zip backups of
          data/config.json and data/updates.json in a zip file. Default: 0."
      SHOUTRRR_ADDRESSES:
        name: SHOUTRRR_ADDRESSES
        description: (optional) Comma separated list of [Shoutrrr
          addresses](https://containrrr.dev/shoutrrr/v0.8/services/overview/)
          (notification services).
      SHOUTRRR_DEFAULT_TITLE:
        name: SHOUTRRR_DEFAULT_TITLE
        description: "Default title for Shoutrrr notifications. Default: DDNS Updater."
      CONFIG:
        name: CONFIG
        description: One line JSON object containing the entire config (takes precedence
          over config.json file) if specified.

  settings:
    name: "Provider settings"
    description: "List of DNS provider configurations. Each item represents one
      record update rule."
    fields:
      domain:
        name: Domain
        description: "Domain setting (required: all providers)."
      provider:
        name: Provider
        description: "Provider setting (required: all providers)."
      owner:
        name: Owner
        description: "Owner setting (optional: all providers)."
      ip_version:
        name: Ip Version
        description: "Ip Version setting (optional: all providers)."
      ipv6_suffix:
        name: Ipv6 Suffix
        description: "Ipv6 Suffix setting (optional: all providers)."
      password:
        name: Password
        description: "Password setting (required: Allinkl, ChangeIP, DD24, DDNSS.de,
          DNSOMatic, Dynu, GoIP.de, He.net, Infomaniak, INWX, Loopia, Namecheap,
          Netcup, NoIP, Now-DNS, OpenDNS, OVH, Selfhost.de, Servercow.de, Spdyn,
          Strato.de, Variomedia.de; optional: DonDominio, Dyn)."
      username:
        name: Username
        description: "Username setting (required: Allinkl, ChangeIP, DDNSS.de,
          DNSOMatic, DonDominio, Dyn, Dynu, EasyDNS, GoIP.de, Infomaniak, INWX,
          Loopia, Name.com, NoIP, Now-DNS, OpenDNS, OVH, Selfhost.de,
          Servercow.de, Zoneedit)."
      token:
        name: Token
        description: "Token setting (required: deSEC, DigitalOcean, DNSPod, Domeneshop,
          DuckDNS, DynV6, EasyDNS, FreeDNS, Hetzner, HetznerCloud, Linode,
          LuaDNS, Name.com, Vercel, Zoneedit; optional: Cloudflare, Spdyn)."
      key:
        name: Key
        description: "Key setting (required: Cloudflare, DonDominio, Dreamhost, Gandi,
          GoDaddy, IPv64, Myaddr, NameSilo, Njalla)."
      api_key:
        name: Api Key
        description: "Api Key setting (required: Ionos, Netcup, Porkbun, Spaceship)."
      secret:
        name: Secret
        description: "Secret setting (required: Domeneshop, GoDaddy)."
      email:
        name: Email
        description: "Email setting (required: LuaDNS, Variomedia.de; optional:
          Cloudflare)."
      secret_key:
        name: Secret Key
        description: "Secret Key setting (required: Route53, Scaleway)."
      access_key_id:
        name: Access Key Id
        description: "Access Key Id setting (required: Aliyun)."
      access_secret:
        name: Access Secret
        description: "Access Secret setting (required: Aliyun)."
      region:
        name: Region
        description: "Region setting (required: Aliyun)."
      ipv4key:
        name: Ipv4key
        description: "Ipv4key setting (required: Custom)."
      ipv6key:
        name: Ipv6key
        description: "Ipv6key setting (required: Custom)."
      success_regex:
        name: Success Regex
        description: "Success Regex setting (required: Custom)."
      url:
        name: Url
        description: "Url setting (required: Custom)."
      client_key:
        name: Client Key
        description: "Client Key setting (required: Dyn)."
      personal_access_token:
        name: Personal Access Token
        description: "Personal Access Token setting (required: Gandi)."
      credentials:
        name: Credentials
        description: "Credentials setting (required: GCP)."
      project:
        name: Project
        description: "Project setting (required: GCP)."
      zone:
        name: Zone
        description: "Zone setting (required: GCP)."
      customer_number:
        name: Customer Number
        description: "Customer Number setting (required: Netcup)."
      api_endpoint:
        name: Api Endpoint
        description: "Api Endpoint setting (required: OVH)."
      app_key:
        name: App Key
        description: "App Key setting (required: OVH)."
      app_secret:
        name: App Secret
        description: "App Secret setting (required: OVH)."
      consumer_key:
        name: Consumer Key
        description: "Consumer Key setting (required: OVH)."
      mode:
        name: Mode
        description: "Mode setting (required: OVH)."
      secret_api_key:
        name: Secret Api Key
        description: "Secret Api Key setting (required: Porkbun)."
      access_key:
        name: Access Key
        description: "Access Key setting (required: Route53)."
      zone_id:
        name: Zone Id
        description: "Zone Id setting (required: Route53)."
      api_secret:
        name: Api Secret
        description: "Api Secret setting (required: Spaceship)."
      apikey:
        name: Apikey
        description: "Apikey setting (required: Vultr)."
      ttl:
        name: Ttl
        description: "Ttl setting (optional: Cloudflare, Gandi, Hetzner, HetznerCloud,
          Name.com, NameSilo, Porkbun, Route53, Scaleway, Servercow.de,
          Spaceship, Vercel, Vultr)."
      zone_identifier:
        name: Zone Identifier
        description: "Zone Identifier setting (optional: Cloudflare, Hetzner)."
      proxied:
        name: Proxied
        description: "Proxied setting (optional: Cloudflare)."
      user_service_key:
        name: User Service Key
        description: "User Service Key setting (optional: Cloudflare)."
      dual_stack:
        name: Dual Stack
        description: "Dual Stack setting (optional: DDNSS.de)."
      group:
        name: Group
        description: "Group setting (optional: Dynu)."
      user:
        name: User
        description: "User setting (optional: Spdyn)."
      team_id:
        name: Team Id
        description: "Team Id setting (optional: Vercel)."
