configuration:
  environments:
    name: "Environment variables"
    description: "Environment variables passed directly to ddns-updater."
    fields:
      PERIOD:
        name: "PERIOD"
        description: "Interval between update checks. Default: 5m."
      UPDATE_COOLDOWN_PERIOD:
        name: "UPDATE_COOLDOWN_PERIOD"
        description: "Cooldown between updates per record to avoid rate limits. Default: 5m."
      HTTP_TIMEOUT:
        name: "HTTP_TIMEOUT"
        description: "Timeout for outbound HTTP requests. Default: 10s."
      SERVER_ENABLED:
        name: "SERVER_ENABLED"
        description: "Enable the web server and web UI. Default: yes."
      LISTENING_ADDRESS:
        name: "LISTENING_ADDRESS"
        description: "Internal listening address for the web UI. Default: :8000."
      LOG_LEVEL:
        name: "LOG_LEVEL"
        description: "Log verbosity level (debug, info, warning, error). Default: info."
      LOG_CALLER:
        name: "LOG_CALLER"
        description: "Show caller information in logs (hidden, short). Default: hidden."
      DATADIR:
        name: "DATADIR"
        description: "Internal directory used to read and write data files. Default: /updater/data."
      PUBLICIP_FETCHERS:
        name: "PUBLICIP_FETCHERS"
        description: "Comma-separated fetcher types used to detect the public IP (http,dns). Default: all."
      PUBLICIP_HTTP_PROVIDERS:
        name: "PUBLICIP_HTTP_PROVIDERS"
        description: "Comma-separated HTTP providers used to detect public IPv4/IPv6. Default: all."
      PUBLICIPV4_HTTP_PROVIDERS:
        name: "PUBLICIPV4_HTTP_PROVIDERS"
        description: "Comma-separated HTTP providers used to detect public IPv4 only. Default: all."
      PUBLICIPV6_HTTP_PROVIDERS:
        name: "PUBLICIPV6_HTTP_PROVIDERS"
        description: "Comma-separated HTTP providers used to detect public IPv6 only. Default: all."
      PUBLICIP_DNS_PROVIDERS:
        name: "PUBLICIP_DNS_PROVIDERS"
        description: "Comma-separated DNS providers used to detect public IP addresses. Default: all."
      PUBLICIP_DNS_TIMEOUT:
        name: "PUBLICIP_DNS_TIMEOUT"
        description: "DNS query timeout for public IP detection. Default: 3s."
      RESOLVER_ADDRESS:
        name: "RESOLVER_ADDRESS"
        description: "Plain DNS server address used to resolve configured domains (useful for split DNS). Default: system/network resolver."
      RESOLVER_TIMEOUT:
        name: "RESOLVER_TIMEOUT"
        description: "Timeout used for resolver lookups when RESOLVER_ADDRESS is set. Default: 5s."
      HEALTH_HEALTHCHECKSIO_BASE_URL:
        name: "HEALTH_HEALTHCHECKSIO_BASE_URL"
        description: "Base URL for the healthchecks.io endpoint. Default: https://hc-ping.com."
      HEALTH_HEALTHCHECKSIO_UUID:
        name: "HEALTH_HEALTHCHECKSIO_UUID"
        description: "UUID used to identify this instance with healthchecks.io."
      BACKUP_PERIOD:
        name: "BACKUP_PERIOD"
        description: "Enable periodic zip backups when set to a duration (for example 72h15m). Default: 0 (disabled)."
      BACKUP_DIRECTORY:
        name: "BACKUP_DIRECTORY"
        description: "Directory where backup zip files are written when backups are enabled. Default: /updater/data."
      SHOUTRRR_ADDRESSES:
        name: "SHOUTRRR_ADDRESSES"
        description: "Comma-separated Shoutrrr notification addresses."
      SHOUTRRR_DEFAULT_TITLE:
        name: "SHOUTRRR_DEFAULT_TITLE"
        description: "Default title used for Shoutrrr notifications. Default: DDNS Updater."
      CONFIG:
        name: "CONFIG"
        description: "One-line JSON object containing the complete configuration; overrides config file content when set."

  settings:
    name: "Provider settings"
    description: "List of DNS provider configurations. Each item represents one record update rule."
    fields:
      provider:
        name: "Provider"
        description: "DNS provider slug used for this item (required: all providers)."
      domain:
        name: "Domain"
        description: "Domain or host to update; multiple values can be comma-separated where supported (required: all providers)."
      owner:
        name: "Owner"
        description: "Legacy owner/host field; prefer encoding host(s) in domain (optional: all providers)."
      ip_version:
        name: "IP version"
        description: "Which IP family to update (ipv4, ipv6, ipv4or6) (optional: all providers)."
      ipv6_suffix:
        name: "IPv6 suffix"
        description: "IPv6 network prefix/suffix used when matching IPv6 addresses (optional: all providers)."
      password:
        name: "Password"
        description: "Account password or DDNS password (required: AllInkl, ChangeIP, DD24, DDNSS.de, DNSOMatic, Dynu, GoIP.de, He.net, Infomaniak, INWX, Loopia, Namecheap, Netcup, NoIP, Now-DNS, OpenDNS, Selfhost.de, Servercow.de, Strato.de, Variomedia.de; optional: DynDNS, OVH, Spdyn)."
      username:
        name: "Username"
        description: "Account username/login (required: AllInkl, ChangeIP, DDNSS.de, DNSOMatic, DonDominio, DynDNS, Dynu, EasyDNS, GoIP.de, Infomaniak, INWX, Loopia, Name.com, NoIP, Now-DNS, OpenDNS, Selfhost.de, Servercow.de; optional: OVH)."
      token:
        name: "Token"
        description: "API token credential (required: deSEC, DigitalOcean, DNSPod, Domeneshop, DuckDNS, DynV6, EasyDNS, FreeDNS, Hetzner, LuaDNS, Name.com, Zoneedit; optional: Cloudflare, Spdyn)."
      key:
        name: "Key"
        description: "API key credential (required: DonDominio, Dreamhost, GoDaddy, Myaddr, NameSilo, Njalla; optional: Cloudflare, Gandi)."
      api_key:
        name: "API key"
        description: "Provider API key (required: Ionos, Netcup, Porkbun)."
      secret:
        name: "Secret"
        description: "API secret credential (required: Domeneshop, GoDaddy)."
      email:
        name: "Email"
        description: "Account email identifier (required: LuaDNS, Variomedia.de; optional: Cloudflare)."
      access_key_id:
        name: "Access key ID"
        description: "Aliyun access key ID (required: Aliyun)."
      access_secret:
        name: "Access secret"
        description: "Aliyun access key secret (required: Aliyun)."
      region:
        name: "Region"
        description: "Provider region identifier (required: Aliyun)."
      ipv4key:
        name: "IPv4 key"
        description: "Placeholder in the custom provider URL/body for IPv4 values (required: Custom)."
      ipv6key:
        name: "IPv6 key"
        description: "Placeholder in the custom provider URL/body for IPv6 values (required: Custom)."
      success_regex:
        name: "Success regex"
        description: "Regular expression used to validate successful custom provider responses (required: Custom)."
      url:
        name: "URL"
        description: "Update endpoint URL used by the custom provider (required: Custom)."
      client_key:
        name: "Client key"
        description: "DynDNS client key (required: DynDNS)."
      personal_access_token:
        name: "Personal access token"
        description: "Gandi personal access token (required: Gandi unless key is used; optional: Gandi)."
      credentials:
        name: "Credentials"
        description: "Google Cloud service account credentials JSON (required: GCP)."
      project:
        name: "Project"
        description: "Google Cloud project ID (required: GCP)."
      zone:
        name: "Zone"
        description: "Google Cloud DNS managed zone name (required: GCP)."
      customer_number:
        name: "Customer number"
        description: "Netcup customer number (required: Netcup)."
      api_endpoint:
        name: "API endpoint"
        description: "OVH API endpoint region/domain (required: OVH API mode)."
      app_key:
        name: "App key"
        description: "OVH application key for API mode (required: OVH API mode)."
      app_secret:
        name: "App secret"
        description: "OVH application secret for API mode (required: OVH API mode)."
      consumer_key:
        name: "Consumer key"
        description: "OVH consumer key for API mode (required: OVH API mode)."
      mode:
        name: "Mode"
        description: "OVH mode selector (api or dyndns) (required: OVH)."
      secret_api_key:
        name: "Secret API key"
        description: "Porkbun secret API key (required: Porkbun)."
      access_key:
        name: "Access key"
        description: "AWS access key for Route53 (required: Route53)."
      secret_key:
        name: "Secret key"
        description: "AWS secret key for Route53 (required: Route53)."
      zone_id:
        name: "Zone ID"
        description: "Hosted zone ID for Route53 (required: Route53)."
      apikey:
        name: "API key (legacy name)"
        description: "Vultr API key field name used by provider implementation (required: Vultr)."
      ttl:
        name: "TTL"
        description: "DNS record TTL in seconds (optional: Cloudflare, Gandi, Hetzner, Name.com, NameSilo, Porkbun, Route53, Servercow.de, Vultr)."
      zone_identifier:
        name: "Zone identifier"
        description: "Explicit DNS zone ID to avoid auto-discovery (optional: Cloudflare, Hetzner)."
      proxied:
        name: "Proxied"
        description: "Enable Cloudflare proxy mode for records (optional: Cloudflare)."
      user_service_key:
        name: "User service key"
        description: "Cloudflare User Service Key authentication method (optional: Cloudflare)."
      dual_stack:
        name: "Dual stack"
        description: "Enable dual-stack behavior for the DDNSS.de provider (optional: DDNSS.de)."
      group:
        name: "Group"
        description: "Dynu group identifier for grouped updates (optional: Dynu)."
      user:
        name: "User"
        description: "Spdyn username used with password authentication (optional: Spdyn)."
