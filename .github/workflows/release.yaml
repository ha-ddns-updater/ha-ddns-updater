name: Release

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run release automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Determine release tag
        id: release-tag
        run: |
          TAG=$(git tag --points-at HEAD | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-ha[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
          if [ -z "${TAG}" ]; then
            echo "No release tag found on HEAD; skipping Build dispatch."
            echo "found=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "Using release tag: ${TAG}"
          echo "found=true" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Trigger Build workflow
        if: steps.release-tag.outputs.found == 'true'
        run: gh workflow run build.yaml --ref "${{ steps.release-tag.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
