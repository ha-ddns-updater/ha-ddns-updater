name: Build

on:
  release:
    types: [published]

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: ha-ddns-updater
  DOCKERHUB_IMAGE: docker.io/haddnsupdater/ha-ddns-updater

permissions:
  contents: read

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read # To check out the code
      id-token: write # Write needed for Cosign signing (issue OIDC token for signing)
      packages: write # To push built images to GitHub Container Registry
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          context: ./ddns-updater
          cosign: false
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ github.event.release.tag_name }}
            latest
          push: "true"
          version: ${{ github.event.release.tag_name }}

  manifest:
    name: Publish multi-arch manifest
    needs: [init, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Write needed for Cosign signing (issue OIDC token for signing)
      packages: write # To push the manifest to GitHub Container Registry
    steps:
      - name: Publish multi-arch manifest to GitHub Container Registry
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          cosign: false
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ github.event.release.tag_name }}
            latest

  copy-to-dockerhub:
    name: Copy multi-arch manifest to Docker Hub
    needs: manifest
    runs-on: ubuntu-latest
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Copy images to Docker Hub
        env:
          GHCR_SOURCE: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          DOCKERHUB_DEST: ${{ env.DOCKERHUB_IMAGE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Create skopeo auth files
          mkdir -p ~/.config/containers
          cat > ~/.config/containers/auth.json <<EOF
          {
            "auths": {
              "ghcr.io": {
                "auth": "$(echo -n '${{ github.repository_owner }}:${{ secrets.GITHUB_TOKEN }}' | base64 -w0)"
              },
              "docker.io": {
                "auth": "$(echo -n '${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}' | base64 -w0)"
              }
            }
          }
          EOF
          chmod 600 ~/.config/containers/auth.json

          # Copy manifest with all tags
          skopeo copy --all ${GHCR_SOURCE}:${{ github.event.release.tag_name }} docker://${DOCKERHUB_DEST}:${{ github.event.release.tag_name }}
          skopeo copy --all ${GHCR_SOURCE}:latest docker://${DOCKERHUB_DEST}:latest
