name: Upstream Version Bump

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  check-upstream:
    name: Check upstream image tag
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Detect and apply upstream patch tag update
        id: detect
        run: node .github/scripts/upstream-bump.mjs --write

      - name: Create pull request
        if: steps.detect.outputs.update_needed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: bump upstream ddns-updater to ${{ steps.detect.outputs.upstream_version }}"
          branch: "feature/upstream-ddns-updater-${{ steps.detect.outputs.upstream_version }}"
          delete-branch: true
          title: "feat: bump upstream ddns-updater to ${{ steps.detect.outputs.upstream_version }}"
          body: |
            This PR updates the wrapped upstream image version.

            - Upstream image: `docker.io/qmcgaw/ddns-updater:${{ steps.detect.outputs.upstream_version }}`
            - Add-on version in `ddns-updater/config.yaml` is preserved and only bumped by semantic-release.

            Auto-generated by `.github/workflows/upstream-bump.yaml`.
          labels: |
            dependencies
            automated
          add-paths: |
            ddns-updater/Dockerfile
            ddns-updater/config.yaml
            .releaserc.cjs
